<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A curated strategy library and education hub for Composer.trade systematic investing strategies.">
  <title>Composer Atlas — Systematic Strategy Library</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <nav class="nav" id="nav-root"></nav>

  <div class="page">
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <p class="hero-eyebrow">Composer Atlas</p>
        <h1 class="hero-title">A strategy library for systematic investors.</h1>
        <p class="hero-desc">Backtested performance data, strategy breakdowns, and concept explanations for Composer.trade investment symphonies.</p>
        <div class="hero-actions">
          <a href="#strategies" class="btn btn-green btn-lg">Browse Strategies</a>
          <a id="hero-glossary-link" href="#" class="btn btn-outline btn-lg">Glossary</a>
        </div>
      </div>
    </section>

    <!-- Stats bar -->
    <section class="stats-bar">
      <div class="container">
        <div class="stats-inner" id="stats-inner">
          <div>
            <p class="stat-value" id="stat-count">—</p>
            <p class="stat-label">Strategies</p>
          </div>
          <div>
            <p class="stat-value" id="stat-sharpe">—</p>
            <p class="stat-label">Best Sharpe</p>
          </div>
          <div>
            <p class="stat-value" id="stat-arr">—</p>
            <p class="stat-label">Top ARR</p>
          </div>
          <div>
            <p class="stat-value" id="stat-concepts">—</p>
            <p class="stat-label">Concepts</p>
          </div>
          <div>
            <p class="stat-value" id="stat-backtest">—</p>
            <p class="stat-label">Longest Backtest</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Strategy grid -->
    <section id="strategies" style="padding: 48px 0">
      <div class="container">
        <div class="section-header">
          <h2>Strategies</h2>
          <span class="section-count" id="strategy-count"></span>
        </div>
        <div class="grid-3" id="strategy-grid">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </section>
  </div>

  <footer id="footer-root"></footer>

  <script src="data/strategies.js"></script>
  <script src="data/glossary.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async function () {
      document.getElementById('hero-glossary-link').href = u('/glossary.html');

      const [strategies, glossary] = await Promise.all([loadStrategies(), loadGlossary()]);

      // Stats
      document.getElementById('stat-count').textContent = strategies.length;
      document.getElementById('stat-sharpe').textContent = Math.max(...strategies.map(s => s.sharpe_ratio)).toFixed(2);
      document.getElementById('stat-arr').textContent = formatPct(Math.max(...strategies.map(s => s.annualized_rate_of_return)));
      document.getElementById('stat-concepts').textContent = glossary.length;
      document.getElementById('stat-backtest').textContent = '~' + Math.round(Math.max(...strategies.map(s => s.backtest_days)) / 252) + ' yrs';

      // Strategy grid — sorted by longest backtest first
      const sorted = [...strategies].sort((a, b) => b.backtest_days - a.backtest_days);
      const grid = document.getElementById('strategy-grid');
      grid.innerHTML = sorted.map(renderStrategyCard).join('');
      document.getElementById('strategy-count').textContent = `${strategies.length} strategies`;
    })().catch(err => {
      document.getElementById('strategy-grid').innerHTML = `
        <div class="error-state" style="grid-column:1/-1">
          <h2>Could not load strategies</h2>
          <p>${err.message}</p>
        </div>`;
    });
  </script>
</body>
</html>
